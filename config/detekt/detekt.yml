build:
  maxIssues: 0
  excludeCorrectable: false
  weights:
    # complexity: 2
    # LongParameterList: 1
    # style: 1
    # comments: 1

config:
  validation: true
  warningsAsErrors: false
  checkExhaustiveness: false
  # when writing own rules with new properties, exclude the property path e.g.: 'my_rule_set,.*>.*>[my_property]'
  excludes: ''

processors:
  active: true
  exclude:
    - 'FunctionCountProcessor'
    - 'PropertyCountProcessor'
    - 'ClassCountProcessor'
    - 'PackageCountProcessor'
    - 'KtFileCountProcessor'

console-reports:
  active: true
  exclude:
    - 'ProjectStatisticsReport'
    - 'ComplexityReport'
    - 'NotificationReport'
    - 'FindingsReport'
    - 'FileBasedFindingsReport'
    - 'LiteFindingsReport'

output-reports:
  active: true
  exclude:
  # - 'TxtOutputReport'
    - 'XmlOutputReport'
    - 'HtmlOutputReport'
    - 'SarifOutputReport'
    - 'MdOutputReport'

comments:
  active: true
  UndocumentedPublicClass:
    active: false
  UndocumentedPublicFunction:
    active: false

complexity:
  active: true
  LongMethod:
    active: true
    threshold: 100 
  LargeClass:
    active: true
    threshold: 600
  LongParameterList:
    active: true
    functionThreshold: 6
    constructorThreshold: 7

coroutines:
  active: true

empty-blocks:
  active: true

exceptions:
  active: true

formatting:
  active: true
  Indentation:
    active: false

naming:
  active: true
  FunctionNaming:
    active: true
    excludeClassPattern: '$^'
    # Test functions often use backticks and spaces
    ignoreAnnotated: ['Test', 'Composable', 'Preview']
  TopLevelPropertyNaming:
    active: true
    constantPattern: '[A-Z][A-Za-z0-9]*'

performance:
  active: true
  SpreadOperator:
    active: true

potential-bugs:
  active: true

style:
  active: true
  MagicNumber:
    active: true
    ignoreNumbers: ['-1', '0', '1', '2']
    ignorePropertyDeclaration: true
    ignoreAnnotation: true
    ignoreEnums: true
  WildcardImport:
    active: true
    # Allow star imports for java.util and android.view
    excludeImports: ['java.util.*', 'android.view.*'] 
  MaxLineLength:
    active: true
    maxLineLength: 140
    excludePackageStatements: true
    excludeImportStatements: true
