# This file was generated by the Gradle 'init' task.
# https://docs.gradle.org/current/userguide/build_environment.html#sec:gradle_configuration_properties

# Enable configuration cache for faster builds
org.gradle.configuration-cache=true

# JVM settings - REDUCED for 8GB RAM Mac
# JVM settings - SURVIVAL MODE for 8GB RAM Mac
org.gradle.jvmargs=-Xmx1024m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# Disable parallel execution
org.gradle.parallel=false

# Enable build caching
org.gradle.caching=true

# Kotlin compiler settings - LOW MEMORY
kotlin.incremental=true
kotlin.incremental.java=true
kotlin.code.style=official
kotlin.daemon.jvmargs=-Xmx512m

# Android settings
android.useAndroidX=true
android.nonTransitiveRClass=true

# Aggressive daemon cleanup
org.gradle.daemon=true
org.gradle.daemon.idletimeout=10000
org.gradle.workers.max=1
org.gradle.vfs.watch=false
